<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMEBOX 플래너 | MISSION CONTROL</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@300;400;600;800&family=Orbitron:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body class="dark-theme">
    <div class="app-container">
        <header>
            <div class="logo-section">
                <h1>TIME<span>BOX</span> 플래너</h1>
            </div>
            <div class="date-nav">
                <button id="prev-date" class="btn-nav" title="이전 날짜 (Yesterday)">←</button>
                <p class="current-date" id="date-display">타임라인 계산 중...</p>
                <button id="next-date" class="btn-nav" title="다음 날짜 (Tomorrow)">→</button>
            </div>
            <div class="actions">
                <div class="user-info">
                    <span class="username">{{ username }} | </span>
                    <a href="/logout" class="btn-text">로그아웃</a>
                </div>
                <div id="sync-badge" class="status-badge">서버 연결 중...</div>
                <div class="status-box">
                    <div class="status-indicator" id="sync-status"></div>
                    <span id="sync-msg">대기 중</span>
                </div>
            </div>
        </header>

        <main class="planner-grid">
            <!-- Left Column: Mission-Critical Objectives & Cargo -->
            <section class="mental-space">
                <div class="glass-card priorities">
                    <div class="card-tag">최우선 Top 3</div>
                    <h2>브레인 덤프 중에서 3개를 고르기</h2>
                    <div class="priority-input">
                        <span class="num">01</span>
                        <input type="text" id="top1" placeholder="그중 가장 중요한 일 1순위...">
                    </div>
                    <div class="priority-input">
                        <span class="num">02</span>
                        <input type="text" id="top2" placeholder="두 번째로 중요한 일 2순위...">
                    </div>
                    <div class="priority-input">
                        <span class="num">03</span>
                        <input type="text" id="top3" placeholder="세 번째로 중요한 일 3순위...">
                    </div>
                </div>

                <div class="glass-card brain-dump">
                    <div class="card-tag">브레인 덤프</div>
                    <h2>오늘 해야 할 일을 모두 적어보기</h2>
                    <div id="braindump-list" class="checklist-container">
                        <!-- Items added dynamically -->
                    </div>
                    <div class="list-input-area">
                        <input type="text" id="new-item-input" placeholder="새로운 할 일 추가...">
                        <button id="add-item-btn" class="btn-icon">＋</button>
                    </div>
                </div>
            </section>

            <!-- Right Column: Mission Timeline -->
            <section class="schedule-space">
                <div class="glass-card timebox">
                    <div class="card-tag">타임라인_동기화</div>
                    <div class="schedule-header">
                        <h2>미션 타임라인</h2>
                        <span class="timezone">T-MINUS 18 HOURS (06:00 - 00:00)</span>
                    </div>
                    <div class="timeline-labels">
                        <div class="label-time">시간</div>
                        <div class="label-status">실행여부</div>
                        <div class="label-mission">미션내용</div>
                    </div>
                    <div class="time-blocks" id="time-blocks-container">
                        <!-- Generated by JS -->
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="main.js"></script>
</body>

</html>
